server:
  port: 8080 # 后端运行端口

spring:
  datasource:
    # 请确保你在本地 MySQL 中创建了名为 smart_expense_db 的数据库
    url: jdbc:mysql://localhost:3306/smart_expense_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root     # 你的数据库用户名
    password: 813926 # 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 暂时禁用 Security 的默认登录框（方便你前期调试 API）
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# OCR 配置
ocr:
  provider: local  # 可选: local(本地模拟), aliyun(阿里云OCR)
  # 阿里云OCR配置(当provider为aliyun时需要配置)
  aliyun:
    access-key: ${ALIYUN_ACCESS_KEY:}
    access-secret: ${ALIYUN_ACCESS_SECRET:}
    region: cn-shanghai

# MyBatis-Plus 相关配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 在控制台打印 SQL 语句，方便调试
    map-underscore-to-camel-case: true # 自动将数据库下划线字段映射为驼峰命名